name: Publish Package

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*" # e.g. v1.2.3, v10.20.30
      - "v[0-9]*.[0-9]*.[0-9]*-*" # e.g. v1.2.3-beta.1, v1.2.3-rc.2

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: catqueue_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Tag $GITHUB_REF was not created from main. Aborting publish."
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm test
        env:
          DATABASE_TEST_URL: postgres://postgres:postgres@localhost:5432/catqueue_test_db

      - run: npm publish --access public
