name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # needed for npm trusted publishing (OIDC, no token secret)

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: catqueue_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci
      - run: npm run build
      - run: npm test # never publish without re-running tests, even if CI already passed
        env:
          DATABASE_TEST_URL: ${{ secrets.DATABASE_TEST_URL }}

      - run: npm publish --access public
        env: NPM_SECRET: ${{ secrets.NPM_SECRET }}
